# Per-module mutation config for bash_validator.py
#
# bash_validator.py is the primary security gate for all Bash tool
# invocations — 5-phase pipeline (unwrap, decompose, classify, composition,
# aggregate). Test-command runs the three existing bash_validator test suites.
#
# ANTI-STALENESS RULE (AC-10):
#   A cosmic-ray session (.sqlite) records the test-command results from the
#   moment `cosmic-ray init`/`exec` ran. If you change test files or the
#   source module WITHOUT re-running `cosmic-ray init`, `cr-rate` will report
#   a STALE kill_rate. RE-INIT IS OBLIGATORY after any change to test files
#   listed in test-command, the source module, or this toml.
#   Use `mutkill_approval_grants.py` (not `cr-rate`) for a fresh kill_rate;
#   it re-runs mutate_and_test against the current tests on every invocation.
#   Detect stale sessions with:
#     uv run python tests/evals/mutkill_approval_grants.py \
#       --session bash-validator.sqlite \
#       --toml tests/evals/mutation-bash-validator.toml --check-stale
#
# Equivalent mutants are documented in equivalents-bash-validator.skip once
# the initial survivor triage is complete.
#
# Init:
#   cd gaia && uv run cosmic-ray init tests/evals/mutation-bash-validator.toml bash-validator.sqlite
# Exec (T3 — requires approval):
#   uv run cosmic-ray exec tests/evals/mutation-bash-validator.toml bash-validator.sqlite
# Score:
#   uv run cr-rate bash-validator.sqlite

[cosmic-ray]
module-path = "hooks/modules/tools/bash_validator.py"
timeout = 30.0
excluded-modules = []
test-command = "python3 -m pytest tests/hooks/modules/tools/test_bash_validator.py tests/hooks/modules/tools/test_bash_validator_tokenizer.py tests/hooks/modules/tools/test_bash_pipeline_integration.py -q -x --no-header"

[cosmic-ray.distributor]
name = "local"

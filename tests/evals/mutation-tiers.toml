# Per-module mutation config for tiers.py — AC-3 full-core inventory
#
# Extends AC-3-mutation-baseline.md. Scope narrowed to tiers.py only (the
# COMPLETE module, not the tiers-spike); test-command narrowed to the tiers
# tests (Option A from the baseline). This isolates tiers from the security-core
# package config (mutation-security-core.toml), which re-mutates all four core
# modules at once — running tiers through that toml is redundant double-compute.
# Equivalent mutants for tiers live in tests/evals/equivalents-tiers.skip.
#
# ANTI-STALENESS RULE (AC-10):
#   A cosmic-ray session (.sqlite) records the test-command results from the
#   moment `cosmic-ray init`/`exec` ran. If you change test files or the
#   source module WITHOUT re-running `cosmic-ray init`, `cr-rate` will report
#   a STALE kill_rate. RE-INIT IS OBLIGATORY after any change to test files
#   listed in test-command, the source module, or this toml.
#   Use `mutkill_approval_grants.py` (not `cr-rate`) for a fresh kill_rate;
#   it re-runs mutate_and_test against the current tests on every invocation.
#   Detect stale sessions with:
#     uv run python tests/evals/mutkill_approval_grants.py \
#       --session tiers.sqlite \
#       --toml tests/evals/mutation-tiers.toml --check-stale
#
# Init:
#   cd gaia && uv run cosmic-ray init tests/evals/mutation-tiers.toml tiers.sqlite
# Exec (T3 — requires approval):
#   uv run cosmic-ray exec tests/evals/mutation-tiers.toml tiers.sqlite
# Score:
#   uv run cr-rate tiers.sqlite

[cosmic-ray]
module-path = "hooks/modules/security/tiers.py"
timeout = 30.0
excluded-modules = []
test-command = "python3 -m pytest tests/hooks/modules/security/test_tiers.py tests/hooks/modules/security/test_tiers_mutants.py -q -x --no-header"

[cosmic-ray.distributor]
name = "local"

# Per-module mutation config for mutative_verbs.py — AC-3 full-core inventory
#
# Extends AC-3-mutation-baseline.md. Scope narrowed to mutative_verbs.py only;
# test-command narrowed to test_mutative_verbs.py (Option A from the baseline).
# This reduces per-mutant time from ~60s (full suite) to ~1-2s.
#
# Init:
#   cd gaia && uv run cosmic-ray init tests/evals/mutation-mutative-verbs.toml mutative-verbs.sqlite
# Exec (T3 — requires approval):
#   uv run cosmic-ray exec tests/evals/mutation-mutative-verbs.toml mutative-verbs.sqlite
# Score:
#   uv run cr-rate mutative-verbs.sqlite

[cosmic-ray]
module-path = "hooks/modules/security/mutative_verbs.py"
timeout = 30.0
excluded-modules = []
test-command = "python3 -m pytest tests/hooks/modules/security/test_mutative_verbs.py -q -x --no-header"

[cosmic-ray.distributor]
name = "local"

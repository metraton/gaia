# Per-module mutation config for mutative_verbs.py — AC-3 full-core inventory
#
# Extends AC-3-mutation-baseline.md. Scope narrowed to mutative_verbs.py only;
# test-command narrowed to test_mutative_verbs.py (Option A from the baseline).
# This reduces per-mutant time from ~60s (full suite) to ~1-2s.
#
# ANTI-STALENESS RULE (AC-10):
#   A cosmic-ray session (.sqlite) records the test-command results from the
#   moment `cosmic-ray init`/`exec` ran. If you change test files or the
#   source module WITHOUT re-running `cosmic-ray init`, `cr-rate` will report
#   a STALE kill_rate. RE-INIT IS OBLIGATORY after any change to test files
#   listed in test-command, the source module, or this toml.
#   Use `mutkill_approval_grants.py` (not `cr-rate`) for a fresh kill_rate.
#   Detect stale sessions with:
#     uv run python tests/evals/mutkill_approval_grants.py \
#       --session mutative-verbs.sqlite \
#       --toml tests/evals/mutation-mutative-verbs.toml --check-stale
#
# Init:
#   cd gaia && uv run cosmic-ray init tests/evals/mutation-mutative-verbs.toml mutative-verbs.sqlite
# Exec (T3 — requires approval):
#   uv run cosmic-ray exec tests/evals/mutation-mutative-verbs.toml mutative-verbs.sqlite
# Score:
#   uv run cr-rate mutative-verbs.sqlite

[cosmic-ray]
module-path = "hooks/modules/security/mutative_verbs.py"
timeout = 30.0
excluded-modules = []
test-command = "python3 -m pytest tests/hooks/modules/security/test_mutative_verbs.py tests/hooks/modules/security/test_mutative_verbs_mutants.py -q -x --no-header"

[cosmic-ray.distributor]
name = "local"

# Permanent mutation-testing baseline for Gaia's security core.
#
# AC-3 (brief: fundamento-de-tests). Report-only (D1): this config is run on
# demand to measure mutation score on the security-critical modules; it is NOT
# wired into a CI gate.
#
# Scope -- the four security-core modules:
#   - hooks/modules/security/tiers.py            (tier classification)
#   - hooks/modules/security/mutative_verbs.py   (mutative-verb detection)
#   - hooks/modules/security/blocked_commands.py (irreversible-command denial)
#   - hooks/modules/security/approval_grants.py  (nonce/approval store)
#
# cosmic-ray's `module-path` is a single path. Pointed at the security package
# it mutates every module in it, so `excluded-modules` (glob patterns) carves
# the package down to exactly the four core modules above. When a non-core
# security module gains test coverage worth measuring, drop its exclusion line.
#
# ANTI-STALENESS RULE (AC-10):
#   A cosmic-ray session (.sqlite) records the test-command results from the
#   moment `cosmic-ray init`/`exec` ran. If you change test files or any of
#   the four core modules WITHOUT re-running `cosmic-ray init`, `cr-rate` will
#   report a STALE kill_rate — the session's recorded outcomes do not reflect
#   your new tests. This is a known trap: it caused kill_rate to appear
#   unchanged after +101 additional kills in the hardening loop (AC-10).
#
#   RE-INIT IS OBLIGATORY after any of:
#     - editing any test file in tests/hooks/modules/security/
#     - editing any of the four core modules above
#     - changing test-command, module-path, or excluded-modules in this toml
#
#   The `mutkill_approval_grants.py` harness does NOT suffer from staleness:
#   it re-runs `mutate_and_test` on every invocation using the current tests.
#   Use it (not `cr-rate`) for an up-to-date kill_rate during the hardening
#   loop. Detect stale sessions with --check-stale:
#     uv run python tests/evals/mutkill_approval_grants.py \
#       --session security-core.sqlite \
#       --toml tests/evals/mutation-security-core.toml --check-stale
#
# Re-init required after any change to module-path / excluded-modules /
# timeout / test-command:
#   uv run cosmic-ray init tests/evals/mutation-security-core.toml security-core.sqlite
#   uv run cosmic-ray exec tests/evals/mutation-security-core.toml security-core.sqlite   # T3
#   uv run cr-rate security-core.sqlite
#
# Equivalent mutants are NOT chased: they are documented with a rigorous
# why-unkillable argument and excluded from the kill-rate denominator via
# per-module skip files. The full proofs live in
# tests/evals/evidence/equivalents-security-core.md; the skip files are its
# materialization (one job_id per non-comment line):
#   - equivalents-tiers.skip            (tiers.py, Category T1 — 6 mutants)
#   - equivalents-mutative-verbs.skip   (mutative_verbs.py, M1–M10)
#   - equivalents-blocked-commands.skip (blocked_commands.py, B1–B3)
#   - equivalents-approval-grants.skip  (approval_grants.py, E1–E13)
# Honest closure tests for the killable survivors live in
# tests/hooks/modules/security/test_*_mutants.py (test_tiers_mutants.py for
# tiers.py). Per-mutant verification: tests/evals/_probe_*_mutants.py — the
# deterministic single-mutant probe, NOT a full `pytest -x` run (which is
# non-deterministic under sharding).

[cosmic-ray]
module-path = "hooks/modules/security"
timeout = 30.0
excluded-modules = [
    "**/__init__.py",
    "**/approval_cleanup.py",
    "**/approval_constants.py",
    "**/approval_messages.py",
    "**/approval_scopes.py",
    "**/blocked_message_formatter.py",
    "**/capability_classes.py",
    "**/command_semantics.py",
    "**/composition_rules.py",
    "**/flag_classifiers.py",
    "**/gaia_db_write_guard.py",
    "**/inline_ast_analyzer.py",
    "**/network_hosts.py",
    "**/prompt_validator.py",
    "**/shell_unwrapper.py",
]
test-command = "python3 -m pytest tests/hooks/modules/security/ -q -x --no-header"

[cosmic-ray.distributor]
name = "local"

# NOTE on parallelism: the brief requested num-workers = 4, but cosmic-ray's
# `local` distributor runs strictly serially -- it has no worker-count knob.
# Parallelism requires the `http` distributor with separately-launched worker
# processes, which the single-`exec` baseline run does not provision. We keep
# `local` (the distributor the AC-3 spike validated end-to-end). If a 4-way
# parallel run is later needed, switch to:
#     [cosmic-ray.distributor]
#     name = "http"
#     [cosmic-ray.distributor.http]
#     worker-urls = ["http://localhost:9876", ...]   # one URL per worker
# and start the workers with `cosmic-ray http-worker` before `exec`.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest==8.3.5

      - name: Run tests
        run: python -m pytest tests/ -x -q --tb=short --ignore=tests/layer2_llm_evaluation --ignore=tests/layer3_e2e --ignore=tests/evals

  l2-ci-subset:
    name: L2 ci_subset (budget-bounded LLM)
    runs-on: ubuntu-latest
    # Budget guard: the subset only spends tokens on push to main, and only when
    # the ANTHROPIC_API_KEY secret is configured. On secretless runs the step
    # no-ops, so the subset never burns budget unexpectedly (brief #89 AC-6).
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest==8.3.5

      - name: Run L2 ci_subset under controlled budget
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY not configured -- skipping L2 ci_subset (no budget spent)."
            exit 0
          fi
          # Bounded subset only: -m ci_subset selects the marked L2 tests; the
          # subset is intentionally tiny (2 single-filter routing cases) to keep
          # per-CI token spend small. No full-suite L2 run here.
          python -m pytest tests/layer2_llm_evaluation -m ci_subset -q --tb=short

  lint-js:
    name: ESLint (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build-plugins:
    name: Build Plugin (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # Single unified plugin (gaia-ops / gaia-security are retired). There is
      # no dist/ bundle: under source:npm the repo root IS the plugin, so the
      # only build step regenerates the two generated manifests in place --
      # the same invocation as package.json's `generate:plugin-root` script.
      - name: Generate plugin root manifests
        run: python3 scripts/build-plugin.py gaia --manifests-only --output-dir .

      - name: Verify build outputs
        run: |
          test -f .claude-plugin/plugin.json
          test -f hooks/hooks.json
          echo "Plugin manifests verified"

  validate-manifests:
    name: Validate Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Validate manifests (version drift check)
        run: npm run pre-publish:validate

  # ==========================================================================
  # Windows compatibility -- the evidence source for the Windows artifact
  # acceptance criteria (brief gaia-windows-compatibility: AC-2/4/6/8).
  #
  # Every other job runs on ubuntu-latest, so before this job Gaia had ZERO
  # Windows coverage. This job runs the landed compatibility fixes on a REAL
  # windows-latest runner, so each is exercised on the platform it targets:
  #   * hooks/modules/core/filelock.py     -- removes the POSIX-only `import
  #                                            fcntl` crash (#5); msvcrt on Win
  #   * bin/cli/_install_helpers.py        -- forward-slash (.as_posix) paths
  #                                            (the installer bad-escape, #2) +
  #                                            symlink copy/junction fallback
  #                                            for an unprivileged Windows host
  #   * scripts/bootstrap_database.py      -- DB bootstrap with NO `sqlite3`
  #                                            CLI and NO `bash` in PATH
  #   * `gaia doctor` hooks-importable check
  #
  # Step -> AC map:
  #   AC-2  "AC-2 -- hooks import on Windows"      (fcntl / POSIX-only imports)
  #   AC-4  "AC-4 -- gaia install exits 0"         (install success on Windows)
  #   AC-6  "AC-6 -- gaia doctor is green"         (no RED checks; symlinks 6/6
  #                                                 or recognized copy fallback)
  #   AC-8  "AC-8 -- runtime smoke"                (whole job + the runtime
  #                                                 post_tool_use / T3 grant /
  #                                                 FTS5 smoke)
  #
  # rc.2 launcher/workspace-resolution extension (Step -> what it proves):
  #   "RC-2 launcher-generated"            -> `gaia install` WITHOUT --no-path
  #        emits gaia.cmd + gaia.ps1 (install.py Step 6.5) AND gaia.ps1 runs in
  #        the MIDDLE of a pipeline (the rc.1 "Cannot run a document in the
  #        middle of a pipeline" bug); also evidences the baked `python` token
  #        (POSIX bakes `python3`) resolves on windows-latest.
  #   "RC-2 resolution-workspace-via-env"  -> `gaia doctor` invoked THROUGH the
  #        generated launcher WITHOUT --workspace resolves the correct workspace
  #        from the baked GAIA_WORKSPACE_PATH and reports 0 RED checks. AC-4/AC-6
  #        used --no-path + explicit --workspace and so skipped BOTH the launcher
  #        and the env-derivation path -- which is why the user-only false
  #        CRITICAL never surfaced in CI. These two steps exercise them.
  #
  # The heavy assertions (import-every-hook, parse doctor JSON for red checks,
  # drive the hook entry points + verify the DB) live in the committed helper
  # tests/ci/windows_smoke.py so the YAML stays declarative and shell-agnostic.
  # ==========================================================================
  windows-compat:
    name: Windows compatibility (windows-latest)
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Prepare workspace + data dirs
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/_ws" | Out-Null
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/_gaia" | Out-Null

      # AC-2 -- every module under hooks/ must import on Windows. This is the
      # instant catcher for the fcntl regression (#5): a POSIX-only import
      # raises ModuleNotFoundError here, by module name, before any hook runs.
      # (Re-checked at runtime in AC-8 and by `gaia doctor` in AC-6.)
      - name: AC-2 -- hooks import on Windows
        run: python tests/ci/windows_smoke.py imports

      # AC-4 -- `gaia install` must exit 0 on Windows. Exercises the
      # cross-platform bootstrap (no sqlite3 CLI, no bash), the forward-slash
      # settings paths, and the symlink copy/junction fallback on an
      # unprivileged host. --no-path skips the POSIX ~/.local/bin launcher.
      - name: AC-4 -- gaia install exits 0 on Windows
        env:
          GAIA_DB: ${{ github.workspace }}/_gaia/gaia.db
        run: >-
          python bin/gaia install
          --workspace "${{ github.workspace }}/_ws"
          --db-path "${{ github.workspace }}/_gaia/gaia.db"
          --no-path

      # AC-6 -- `gaia doctor` must report NO red (error) checks on Windows.
      # windows_smoke.py parses `gaia doctor --json` and fails only on
      # severity=error (warnings tolerated), so this asserts the exact AC:
      # hooks-importable passes and Symlinks is 6/6 (real links, or the
      # recognized version-stamped copy fallback).
      - name: AC-6 -- gaia doctor is green on Windows
        env:
          GAIA_DB: ${{ github.workspace }}/_gaia/gaia.db
        run: python tests/ci/windows_smoke.py doctor --workspace "${{ github.workspace }}/_ws"

      # AC-8 -- the artifact works end to end on Windows. In a self-isolated
      # throwaway data dir, windows_smoke.py: (a) drives hooks/post_tool_use.py
      # with a synthetic critical-event payload so the filelock backend is
      # acquired/released at RUNTIME (not just imported); (b) runs the T3 grant
      # cycle block -> activate -> retry, activating at the DB plane under a
      # DIFFERENT session so the check does not depend on the host's activation
      # route (risk R3), verifying the pending-row lifecycle in the DB; and
      # (c) inserts an episode and confirms the episodes_fts mirror stays synced
      # via its AFTER INSERT trigger. The whole job passing + this smoke is AC-8.
      - name: AC-8 -- runtime smoke (post_tool_use + T3 grant + FTS5)
        run: python tests/ci/windows_smoke.py smoke

      # RC-2 (launcher-generated) -- proves what AC-4 structurally cannot: AC-4
      # passes --no-path, which SKIPS install.py Step 6.5 entirely, so the
      # Windows launcher was never generated in CI and the rc.1 launcher bug
      # (extensionless bash shim that PowerShell rejected in a pipeline with
      # "Cannot run a document in the middle of a pipeline") only ever appeared
      # on the user's machine. Here we re-install into the SAME workspace AC-6
      # validated, this time WITHOUT --no-path, so gaia.cmd + gaia.ps1 are
      # actually written to ~/.local/bin (install._install_windows_launchers).
      # We assert BOTH files exist, evidence which `python` the launcher bakes
      # (POSIX bakes `python3`; Windows must resolve `python`), and then drive
      # gaia.ps1 IN THE MIDDLE OF A PIPELINE inside a child pwsh -- the child so
      # the launcher's trailing `exit` cannot terminate this step early -- and
      # require exit 0 with a `gaia <version>` line. `--version` needs no DB and
      # no workspace, so this isolates the pipeability + python-token surface.
      - name: RC-2 launcher-generated -- gaia.cmd/gaia.ps1 emitted + ps1 pipeable
        env:
          GAIA_DB: ${{ github.workspace }}/_gaia/gaia.db
        run: |
          python bin/gaia install --workspace "${{ github.workspace }}/_ws" --db-path "${{ github.workspace }}/_gaia/gaia.db"
          if ($LASTEXITCODE -ne 0) { Write-Error "gaia install (no --no-path) failed with exit $LASTEXITCODE"; exit 1 }
          $base = Join-Path $HOME ".local/bin"
          $cmd  = Join-Path $base "gaia.cmd"
          $ps1  = Join-Path $base "gaia.ps1"
          if (-not (Test-Path -LiteralPath $cmd)) { Write-Error "gaia.cmd NOT created at $cmd (Step 6.5 launcher missing)"; exit 1 }
          if (-not (Test-Path -LiteralPath $ps1)) { Write-Error "gaia.ps1 NOT created at $ps1 (Step 6.5 launcher missing)"; exit 1 }
          Write-Host "launchers present: $cmd ; $ps1"
          # Evidence: the launcher template bakes `python "<bin>" %*` / `& python`.
          # POSIX bakes `python3`; on windows-latest `python` must resolve.
          $py = Get-Command python -ErrorAction SilentlyContinue
          if ($null -eq $py) { Write-Error "no 'python' on PATH -- the launcher bakes 'python', not 'python3'"; exit 1 }
          Write-Host "launcher 'python' token resolves to: $($py.Source)"
          # Pipeability: run gaia.ps1 in the MIDDLE of a pipeline, in a child pwsh
          # (its trailing `exit` must not kill this step). Require exit 0.
          $probe = "& '$ps1' --version | Out-String"
          $out = (pwsh -NoProfile -Command $probe | Out-String).Trim()
          if ($LASTEXITCODE -ne 0) { Write-Error "gaia.ps1 not pipeable (exit $LASTEXITCODE): $out"; exit 1 }
          if ($out -notmatch '^gaia ') { Write-Error "gaia.ps1 ran in a pipeline but output was unexpected: '$out'"; exit 1 }
          Write-Host "gaia.ps1 pipeable OK -> $out"
          exit 0

      # RC-2 (resolution-workspace-via-env) -- `gaia doctor` invoked THROUGH the
      # generated gaia.ps1, WITHOUT --workspace. The launcher exports the baked
      # GAIA_WORKSPACE_PATH, which doctor._derive_workspace honors BEFORE its
      # __file__ derivation (and after --workspace). This reproduces the user's
      # real invocation path (a global shim with no --workspace), which AC-6
      # bypassed by passing --workspace explicitly. In CI bin/gaia lives OUTSIDE
      # any node_modules, so WITHOUT the baked env var _derive_workspace exits 2
      # ("global or symlinked install detected") and prints NO JSON -- exactly
      # the false CRITICAL. WITH the launcher's baked env var it must resolve the
      # installed workspace and report 0 RED checks. Run in a child pwsh (the
      # launcher's trailing `exit` must not kill this step); absence of parseable
      # JSON is itself the regression signal.
      - name: RC-2 resolution-workspace-via-env -- doctor via launcher is HEALTHY
        env:
          GAIA_DB: ${{ github.workspace }}/_gaia/gaia.db
        run: |
          $ps1 = Join-Path (Join-Path $HOME ".local/bin") "gaia.ps1"
          if (-not (Test-Path -LiteralPath $ps1)) { Write-Error "gaia.ps1 missing; the launcher-generated step must run first"; exit 1 }
          # Invoke doctor THROUGH the launcher (no --workspace), in a pipeline.
          $raw = (pwsh -NoProfile -Command "& '$ps1' doctor --json" | Out-String)
          try {
            $doc = $raw | ConvertFrom-Json
          } catch {
            Write-Error "doctor via launcher emitted no parseable JSON -- _derive_workspace likely exited 2 (regression: baked GAIA_WORKSPACE_PATH not honored). raw output:`n$raw"
            exit 1
          }
          foreach ($c in $doc.checks) { Write-Host ("   [{0,-7}] {1}: {2}" -f $c.severity, $c.name, $c.detail) }
          $errs = @($doc.checks | Where-Object { $_.severity -eq 'error' })
          if ($errs.Count -gt 0) {
            Write-Error "doctor via launcher reported $($errs.Count) RED check(s) -- wrong/uninitialized workspace resolved from GAIA_WORKSPACE_PATH"
            foreach ($e in $errs) { Write-Host "   - $($e.name): $($e.detail)" }
            exit 1
          }
          Write-Host "doctor via launcher HEALTHY (status=$($doc.status), 0 red) -- GAIA_WORKSPACE_PATH resolution OK"
          exit 0

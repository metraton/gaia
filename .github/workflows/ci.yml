name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest==8.3.5

      - name: Run tests
        run: python -m pytest tests/ -x -q --tb=short --ignore=tests/layer2_llm_evaluation --ignore=tests/layer3_e2e --ignore=tests/evals

  l2-ci-subset:
    name: L2 ci_subset (budget-bounded LLM)
    runs-on: ubuntu-latest
    # Budget guard: the subset only spends tokens on push to main, and only when
    # the ANTHROPIC_API_KEY secret is configured. On secretless runs the step
    # no-ops, so the subset never burns budget unexpectedly (brief #89 AC-6).
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest==8.3.5

      - name: Run L2 ci_subset under controlled budget
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY not configured -- skipping L2 ci_subset (no budget spent)."
            exit 0
          fi
          # Bounded subset only: -m ci_subset selects the marked L2 tests; the
          # subset is intentionally tiny (2 single-filter routing cases) to keep
          # per-CI token spend small. No full-suite L2 run here.
          python -m pytest tests/layer2_llm_evaluation -m ci_subset -q --tb=short

  lint-js:
    name: ESLint (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build-plugins:
    name: Build Plugin (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # Single unified plugin (gaia-ops / gaia-security are retired). There is
      # no dist/ bundle: under source:npm the repo root IS the plugin, so the
      # only build step regenerates the two generated manifests in place --
      # the same invocation as package.json's `generate:plugin-root` script.
      - name: Generate plugin root manifests
        run: python3 scripts/build-plugin.py gaia --manifests-only --output-dir .

      - name: Verify build outputs
        run: |
          test -f .claude-plugin/plugin.json
          test -f hooks/hooks.json
          echo "Plugin manifests verified"

  validate-manifests:
    name: Validate Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Validate manifests (version drift check)
        run: npm run pre-publish:validate

  # ==========================================================================
  # Windows compatibility -- the evidence source for the Windows artifact
  # acceptance criteria (brief gaia-windows-compatibility: AC-2/4/6/8).
  #
  # Every other job runs on ubuntu-latest, so before this job Gaia had ZERO
  # Windows coverage. This job runs the landed compatibility fixes on a REAL
  # windows-latest runner, so each is exercised on the platform it targets:
  #   * hooks/modules/core/filelock.py     -- removes the POSIX-only `import
  #                                            fcntl` crash (#5); msvcrt on Win
  #   * bin/cli/_install_helpers.py        -- forward-slash (.as_posix) paths
  #                                            (the installer bad-escape, #2) +
  #                                            symlink copy/junction fallback
  #                                            for an unprivileged Windows host
  #   * scripts/bootstrap_database.py      -- DB bootstrap with NO `sqlite3`
  #                                            CLI and NO `bash` in PATH
  #   * `gaia doctor` hooks-importable check
  #
  # Step -> AC map:
  #   AC-2  "AC-2 -- hooks import on Windows"      (fcntl / POSIX-only imports)
  #   AC-4  "AC-4 -- gaia install exits 0"         (install success on Windows)
  #   AC-6  "AC-6 -- gaia doctor is green"         (no RED checks; symlinks 6/6
  #                                                 or recognized copy fallback)
  #   AC-8  "AC-8 -- runtime smoke"                (whole job + the runtime
  #                                                 post_tool_use / T3 grant /
  #                                                 FTS5 smoke)
  #
  # The heavy assertions (import-every-hook, parse doctor JSON for red checks,
  # drive the hook entry points + verify the DB) live in the committed helper
  # tests/ci/windows_smoke.py so the YAML stays declarative and shell-agnostic.
  # ==========================================================================
  windows-compat:
    name: Windows compatibility (windows-latest)
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Prepare workspace + data dirs
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/_ws" | Out-Null
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/_gaia" | Out-Null

      # AC-2 -- every module under hooks/ must import on Windows. This is the
      # instant catcher for the fcntl regression (#5): a POSIX-only import
      # raises ModuleNotFoundError here, by module name, before any hook runs.
      # (Re-checked at runtime in AC-8 and by `gaia doctor` in AC-6.)
      - name: AC-2 -- hooks import on Windows
        run: python tests/ci/windows_smoke.py imports

      # AC-4 -- `gaia install` must exit 0 on Windows. Exercises the
      # cross-platform bootstrap (no sqlite3 CLI, no bash), the forward-slash
      # settings paths, and the symlink copy/junction fallback on an
      # unprivileged host. --no-path skips the POSIX ~/.local/bin launcher.
      - name: AC-4 -- gaia install exits 0 on Windows
        env:
          GAIA_DB: ${{ github.workspace }}/_gaia/gaia.db
        run: >-
          python bin/gaia install
          --workspace "${{ github.workspace }}/_ws"
          --db-path "${{ github.workspace }}/_gaia/gaia.db"
          --no-path

      # AC-6 -- `gaia doctor` must report NO red (error) checks on Windows.
      # windows_smoke.py parses `gaia doctor --json` and fails only on
      # severity=error (warnings tolerated), so this asserts the exact AC:
      # hooks-importable passes and Symlinks is 6/6 (real links, or the
      # recognized version-stamped copy fallback).
      - name: AC-6 -- gaia doctor is green on Windows
        env:
          GAIA_DB: ${{ github.workspace }}/_gaia/gaia.db
        run: python tests/ci/windows_smoke.py doctor --workspace "${{ github.workspace }}/_ws"

      # AC-8 -- the artifact works end to end on Windows. In a self-isolated
      # throwaway data dir, windows_smoke.py: (a) drives hooks/post_tool_use.py
      # with a synthetic critical-event payload so the filelock backend is
      # acquired/released at RUNTIME (not just imported); (b) runs the T3 grant
      # cycle block -> activate -> retry, activating at the DB plane under a
      # DIFFERENT session so the check does not depend on the host's activation
      # route (risk R3), verifying the pending-row lifecycle in the DB; and
      # (c) inserts an episode and confirms the episodes_fts mirror stays synced
      # via its AFTER INSERT trigger. The whole job passing + this smoke is AC-8.
      - name: AC-8 -- runtime smoke (post_tool_use + T3 grant + FTS5)
        run: python tests/ci/windows_smoke.py smoke

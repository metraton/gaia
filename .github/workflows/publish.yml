name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # read-only: the workflow no longer commits built dist/ back or force-moves
      # the tag; it only packs, validates, and publishes to npm.
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Pack tarball
        # Produce the exact artifact that would be published. `npm pack` runs
        # the `prepack` script (clean + generate:plugin-root), which regenerates
        # the ROOT .claude-plugin/plugin.json (inline hooks) + hooks/hooks.json
        # from the manifest -- this is what makes the tarball root a valid
        # `source: npm` Claude Code plugin. No dist/ bundle is built or committed
        # back: the package root IS the plugin, so the old "Build plugins" /
        # "Verify build outputs" / "Commit built plugins" (git add -f dist + tag
        # -f + push --force) steps are gone, and with them the silent tag/dist
        # desync. The sandbox harness installs FROM this tarball, so the gate
        # validates precisely what npm publish would ship — not the working tree.
        id: pack
        run: |
          # Use `npm pack --json` and parse the `filename` field (mirrors
          # bin/cli/_pack_helpers.py's pattern) instead of trusting `npm pack
          # --silent`'s stdout to be a single clean line. `--silent` only
          # quiets npm's OWN log lines -- it does not touch the `prepack`
          # lifecycle script's stdout, which is inherited into this same
          # stream. Any diagnostic the lifecycle script prints (build-plugin.py
          # regenerating .claude-plugin/plugin.json + hooks/hooks.json) would
          # otherwise make TARBALL multi-line and break the single-line
          # $GITHUB_OUTPUT append ("Invalid format"). With --json, npm always
          # emits a JSON array as the LAST stdout content, so parsing the
          # `filename` field from it is robust even if lifecycle noise
          # precedes it on stdout.
          PACK_JSON=$(npm pack --json)
          TARBALL=$(node -p "JSON.parse(process.argv[1].slice(process.argv[1].indexOf('[')))[0].filename" "$PACK_JSON")
          echo "tarball=${PWD}/${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "Packed ${TARBALL}"

      - name: Run validation
        # Runs AFTER pack so it sees the freshly regenerated root manifests.
        run: npm run pre-publish:validate

      - name: Determine npm tag
        id: npm-tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *"-rc."* ]]; then
            echo "tag=rc" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-beta."* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-alpha."* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Sandbox validation harness (PRE-PUBLISH GATE)
        # End-to-end consumer-install verification against the PACKED TARBALL.
        # Installs into an ephemeral sandbox populated from
        # tests/fixtures/sandbox-project/ and exercises install-time code
        # paths (postinstall merge, FTS5 backfill) plus read-side CLI
        # surface (version, doctor, status, context, memory stats/search,
        # scan, preservation checksum). The harness exit code is the gate:
        # if it fails, npm publish below never runs and no broken artifact
        # reaches the registry.
        run: |
          bash bin/validate-sandbox.sh --tarball "${{ steps.pack.outputs.tarball }}" --target sandbox

      - name: Publish to npm
        # Runs ONLY if the sandbox harness above exited 0. The same tarball
        # the harness validated is the one published.
        run: npm publish "${{ steps.pack.outputs.tarball }}" --access public --tag ${{ steps.npm-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Clean build artifacts
        run: npm run clean

      - name: Notify success
        if: success()
        run: echo "Package gated, published, and smoke-installed successfully"

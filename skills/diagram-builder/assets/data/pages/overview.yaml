# Starter page. id lives here (+ cross-referenced in ../document.yaml);
# name/order/visible live in the manifest. This file is pure page content:
# layout, columns, filters, sections. See the diagram-builder dialect
# reference (../GLOSSARY.md, ../reference.md) for every field.
#
# LAYOUT MODEL — a spreadsheet-style grid of UNIFORM CELLS:
#   • every leaf component is one fixed cell (--cell-w × --cell-h); cells never
#     resize — only the column count does.
#   • a node WITH `children` is a SECTION (a grid); WITHOUT it, a COMPONENT (leaf).
#   • `columns: N` = how many columns THIS section's grid has (default 2).
#   • `span: M` = an Excel-style MERGE: a child occupies M columns of its parent
#     (default 1; clamped to the parent's columns). `span == columns` makes the
#     child a full-width BAND that takes its own row — place a band LAST to pin
#     it as a base layer at the bottom.
#   • children flow in `order` (then list order), packing side by side until a
#     band forces a new full row.
#   • the page root is itself a section: `columns` below is the root column count
#     and `sections` is the root's children.
#   • a component (leaf) chooses its `type`: box (default) | separator | rail.
#
# This seed is a tiny, domain-free demo of the model: two INLINE sections side
# by side on row 1 (span 1 each), then a full-width base BAND (span == columns)
# below — plus nesting, a separator, and a rail. Edit it, then run
# `npm run build` and `npm run validate`.

id: overview
layout: grid
# Root: a 2-column canvas. `intro` and `system` are span 1 (inline) so they sit
# side by side on row 1; `delivery` is span 2 (== columns) so it is a full-width
# band on its own row beneath them.
columns: 2

filters:
  - key: all
    label: "All"
  - key: flow
    label: "Example flow"
    steps:
      - "Chips are flows: click one to spotlight every component that declares it and dim the rest."
      - "A component joins a flow by listing the filter key in its own <code>filters</code>."
      - "Here the flow traces edit → web app → API → ship."

sections:

  # ── ROW 1, LEFT · an inline leaf section (span 1), 2 uniform cells ──
  - id: intro
    title: "Getting started"
    subtitle: "edit data/pages/overview.yaml, then npm run build"
    variant: normal
    order: 1
    span: 1
    columns: 2
    children:
      - id: edit
        order: 1
        status: NEW
        title: "Edit the YAML"
        description:
          - "data/document.yaml — the manifest"
          - "data/pages/*.yaml — the content"
        detail: "Change titles, add sections and components, then rebuild. Every field is documented in the diagram-builder dialect reference (GLOSSARY.md and reference.md)."
        variant: strong
        filters: [flow]
      - id: build
        order: 2
        status: ENTRY
        title: "Build & view"
        description:
          - "npm run build regenerates data.generated.js"
          - "open index.html — no server needed"
        detail: "The build step reads the manifest + page files and writes data/data.generated.js. Open index.html in any browser; it renders under file:// with zero runtime dependencies."
        variant: normal

  # ── ROW 1, RIGHT · an inline NESTED section (span 1): a grid of grids ──
  # `envelope` = a borderless dashed container that groups nested sections.
  - id: system
    title: "Example system"
    subtitle: "a section can nest other sections — a grid of grids"
    variant: envelope
    order: 2
    span: 1
    columns: 1
    children:
      - id: frontend
        title: "Frontend"
        variant: safe
        columns: 1
        children:
          - id: webapp
            status: INTERNAL
            title: "Web app"
            description:
              - "the user-facing surface"
            detail: "A nested section is drawn as its own framed zone inside the parent. Its <code>variant</code> (here <code>safe</code>) tints the whole group."
            variant: ok
            filters: [flow]
      - id: backend
        title: "Backend"
        variant: normal
        columns: 1
        children:
          - id: api
            status: INTERNAL
            title: "API"
            description:
              - "handles requests from the web app"
            detail: "Components auto-flow into the section's columns and wrap down. This backend section is <code>columns: 1</code>, so its two boxes stack."
            variant: normal
            filters: [flow]
          - id: db
            status: INTERNAL
            title: "Database"
            description:
              - "persistent store"
            detail: "The <code>store</code> variant gives a data store its own secondary fill."
            variant: store

  # ── ROW 2 · a full-width BASE BAND (span 2 == root columns), placed last ──
  # A columns:3 leaf grid: a labeled separator spans the whole band (its own
  # row), then a rail swimlane label leads a row of uniform step cells.
  - id: delivery
    title: "Delivery"
    subtitle: "span == columns makes this a full-width band on its own row"
    variant: normal
    order: 3
    span: 2
    columns: 3
    children:
      - id: sep-pipeline
        type: separator
        order: 1
        span: 3
        style: dotted
        text: "CI/CD pipeline"
      - id: lane
        type: rail
        order: 2
        title: "CI/CD"
      - id: b1
        order: 3
        status: UNCHANGED
        title: "Build"
        description: ["compile & package"]
      - id: b2
        order: 4
        status: UNCHANGED
        title: "Test"
        description: ["run the suite"]
      - id: b3
        order: 5
        status: NEW
        title: "Ship"
        description: ["deploy to prod"]
        detail: "The last step in the example flow — click the <b>Example flow</b> chip above to trace it end to end."
        variant: strong
        filters: [flow]

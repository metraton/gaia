# Starter page. id lives here (+ cross-referenced in ../document.yaml);
# name/order/visible live in the manifest. This file is pure page content:
# layout, columns, filters, sections. See the diagram-builder dialect
# reference (../GLOSSARY.md, ../reference.md) for every field.
#
# LAYOUT MODEL — a filled grid of uniform-height cells:
#   • every leaf component is one cell: cells are equal `fr` and fill their row;
#     columns collapse before a cell degrades — no horizontal scroll.
#   • a node WITH `children` is a SECTION (a grid); WITHOUT it, a COMPONENT (leaf).
#   • `columns: N` = how many columns THIS section's grid has (default 2).
#   • `span: M` = an Excel-style MERGE: a child occupies M columns of its parent.
#     `span == columns` is a full-width BAND that takes its own row (place a band
#     LAST to pin it as a base layer); `1 < span < columns` is a PARTIAL merge
#     that occupies exactly M of the N tracks (see Section E below).
#   • `rowspan: K` = a VERTICAL merge: a leaf cell occupies K rows (K× the cell
#     height) — the base for a bar chart where a cell's HEIGHT is its magnitude
#     (see Section D below).
#   • children flow in `order` (then list order), packing side by side until a
#     band forces a new full row.
#   • the page root is itself a section: `columns` below is the root column count
#     and `sections` is the root's children.
#   • a component (leaf) chooses its `type`: box (default) | separator | rail.
#
# This seed is a tiny, domain-free demo of every capability of the model:
# two INLINE sections side by side on row 1 (Section A + Section B, with
# nesting), then three full-width BANDS beneath them — a separator + rail
# (Section C), a row-span bar chart (Section D), and a partial 2-of-4 merge
# (Section E). Edit it, then run `npm run build` and `npm run validate`.

id: overview
layout: grid
# Root: a 2-column canvas. Section A and Section B are span 1 (inline), so they
# sit side by side on row 1; Sections C/D/E are span 2 (== columns), so each is a
# full-width band on its own row beneath them.
columns: 2

filters:
  - key: all
    label: "All"
  - key: flow
    label: "Example flow"
    steps:
      - "Chips are flows: click one to spotlight every component that declares it and dim the rest."
      - "A component joins a flow by listing the filter key in its own <code>filters</code>."
      - "Here the flow traces Item 1 → Item 3 → Item 7."

sections:

  # ── ROW 1, LEFT · an inline leaf section (span 1), 2 uniform cells ──
  - id: section-a
    title: "Section A"
    subtitle: "an inline section (span 1) — sits side by side with Section B"
    variant: normal
    order: 1
    span: 1
    columns: 2
    children:
      - id: item-1
        order: 1
        status: NEW
        title: "Item 1"
        description:
          - "a leaf component (a box)"
          - "click it for its full detail"
        detail: "The atom of the diagram is a box: a status badge, a title, and a short description. The full text always lives in this click-through panel, so the box itself stays a fixed height. Every field is documented in the diagram-builder dialect reference (GLOSSARY.md and reference.md)."
        variant: strong
        filters: [flow]
      - id: item-2
        order: 2
        status: ENTRY
        title: "Item 2"
        description:
          - "cells in a row are equal width"
          - "and fill the section edge to edge"
        detail: "Every leaf cell stretches to an equal share of its section's width, so a row of cells always spans the section with no gap on the right."
        variant: normal

  # ── ROW 1, RIGHT · an inline NESTED section (span 1): a grid of grids ──
  # `envelope` = a borderless dashed container that groups nested sections.
  - id: section-b
    title: "Section B"
    subtitle: "a section can nest other sections — a grid of grids"
    variant: envelope
    order: 2
    span: 1
    columns: 1
    children:
      - id: group-1
        title: "Group 1"
        variant: safe
        columns: 1
        children:
          - id: item-3
            status: INTERNAL
            title: "Item 3"
            description:
              - "one level of nesting deep"
            detail: "A nested section is drawn as its own framed zone inside the parent. Its <code>variant</code> (here <code>safe</code>) tints the whole group."
            variant: ok
            filters: [flow]
      - id: group-2
        title: "Group 2"
        variant: normal
        columns: 1
        children:
          - id: item-4
            status: INTERNAL
            title: "Item 4"
            description:
              - "another nested group"
            detail: "Sections nest as deep as the idea needs — a recursive grid of grids down to the boxes at the leaves."
            variant: normal
          - id: item-5
            status: INTERNAL
            title: "Item 5"
            description:
              - "stacks below Item 4 (columns: 1)"
            detail: "This group is <code>columns: 1</code>, so its two boxes stack. The <code>store</code> variant gives a box its own secondary fill."
            variant: store

  # ── ROW 2 · a full-width BASE BAND (span 2 == root columns) ──
  # A columns:3 leaf grid: a labeled separator spans the whole band (its own
  # row), then a rail swimlane label leads a row of uniform step cells.
  - id: section-c
    title: "Section C"
    subtitle: "span == columns makes this a full-width band on its own row"
    variant: normal
    order: 3
    span: 2
    columns: 3
    children:
      - id: sep-c
        type: separator
        order: 1
        span: 3
        style: dotted
        text: "A labeled separator"
      - id: rail-c
        type: rail
        order: 2
        title: "Rail"
      - id: item-6
        order: 3
        status: UNCHANGED
        title: "Item 6"
        description: ["the rail labels this row"]
        detail: "A rail is a swimlane-style label banner; a separator is a thin divider line. Both are structural leaf types, not data-carrying boxes."
      - id: item-7
        order: 4
        status: NEW
        title: "Item 7"
        description: ["the last step in the example flow"]
        detail: "Click the <b>Example flow</b> chip above to trace Item 1 → Item 3 → Item 7 end to end."
        variant: strong
        filters: [flow]

  # ── ROW 3 · a full-width BAND — a mini BAR CHART built from row-span cells ──
  # A columns:3 leaf grid: three cells with rowspan 1, 2, 3 side by side, so the
  # HEIGHT of each cell encodes its magnitude (a bar chart made of grid cells).
  - id: section-d
    title: "Section D"
    subtitle: "a mini bar chart — rowspan 1, 2, 3: a cell's HEIGHT encodes its magnitude"
    variant: normal
    order: 4
    span: 2
    columns: 3
    children:
      - id: bar-1
        order: 1
        rowspan: 1
        title: "1"
        description: ["rowspan: 1", "height = 1 cell"]
        variant: normal
      - id: bar-2
        order: 2
        rowspan: 2
        title: "2"
        description: ["rowspan: 2", "height = 2 cells"]
        variant: ok
      - id: bar-3
        order: 3
        rowspan: 3
        title: "3"
        description: ["rowspan: 3", "height = 3 cells"]
        variant: strong

  # ── ROW 4 · a full-width BAND — a PARTIAL horizontal merge (2 of 4) ──
  # A columns:4 leaf grid: two single cells + one cell that spans exactly 2 of
  # the 4 tracks (NOT the whole row — that would be a band).
  - id: section-e
    title: "Section E"
    subtitle: "a partial merge — Item C spans 2 of 4 columns, not the whole row"
    variant: normal
    order: 5
    span: 2
    columns: 4
    children:
      - id: item-a
        order: 1
        span: 1
        status: UNCHANGED
        title: "Item A"
        description: ["one cell of four"]
      - id: item-b
        order: 2
        span: 1
        status: UNCHANGED
        title: "Item B"
        description: ["one cell of four"]
      - id: item-c
        order: 3
        span: 2
        status: NEW
        title: "Item C — span 2"
        description: ["occupies exactly 2 of the 4 tracks"]
        detail: "A partial merge (1 &lt; span &lt; columns) occupies exactly that many tracks and keeps its proportion as the grid collapses; only a span == columns child becomes a full-width band."
        variant: strong

  # ── ROW 5 · two INLINE sub-decks side by side — the guardrail's fix-1/fix-2 cases ──
  # These two span:1 sections sit side by side on their own root row (like A + B),
  # so they are NOT full-width bands (the Y band-fill invariant does not apply to
  # them). Their job is to give the guardrail geometry to assert against:
  #   • fix-1 — "Tall block" is a COMPOUND row (its children are sub-sections):
  #     a rail label + a vertical separator sit DIRECTLY in that flex row and must
  #     stay CONTENT-sized (flex:0 0 auto), not balloon to an equal flex share.
  #   • fix-2 — "Short stack" is a columns:1 stack of sub-sections that is SHORTER
  #     than "Tall block"; the row's align-items:stretch stretches it, and the
  #     .sec-c1 > * reset keeps its children at content height so the taller one
  #     never OVERFLOWS onto the next (the sibling collision the X invariant guards).
  - id: section-f
    title: "Tall block"
    subtitle: "a compound row — rail + vertical separator dividing two sub-sections"
    variant: normal
    order: 6
    span: 1
    columns: 2
    children:
      - id: rail-f
        type: rail
        orientation: vertical
        order: 1
        title: "Lane"
      - id: grp-l
        title: "Left group"
        variant: normal
        order: 2
        columns: 1
        children:
          - id: l-1
            status: STEP
            title: "Step 1"
            description: ["tall sub-section"]
          - id: l-2
            status: STEP
            title: "Step 2"
            description: ["four stacked cells"]
          - id: l-3
            status: STEP
            title: "Step 3"
            description: ["makes this block tall"]
          - id: l-4
            status: STEP
            title: "Step 4"
            description: ["the taller sibling"]
      - id: sep-f
        type: separator
        orientation: vertical
        order: 3
      - id: grp-r
        title: "Right group"
        variant: normal
        order: 4
        columns: 1
        children:
          - id: r-1
            status: NOTE
            title: "Note A"
            description: ["a shorter sub-section"]
          - id: r-2
            status: NOTE
            title: "Note B"
            description: ["beside the separator"]
  - id: section-g
    title: "Short stack"
    subtitle: "columns:1 stack — shorter, so the row stretches it"
    variant: envelope
    order: 7
    span: 1
    columns: 1
    children:
      - id: gg-1
        title: "Group A"
        variant: normal
        columns: 1
        children:
          - id: gg-1-box-1
            status: INTERNAL
            title: "One item"
            description: ["a stacked sub-section"]
          - id: gg-1-box-2
            status: INTERNAL
            title: "Two item"
            description: ["with a second cell"]
          - id: gg-1-box-3
            status: INTERNAL
            title: "Three item"
            description: ["a third stacked cell — makes Group A the content-heavy",
              "sub-section, so if the columns:1 reset regressed it would be the",
              "one starved by a divided height and overflow onto Group B"]
      - id: gg-2
        title: "Group B"
        variant: normal
        columns: 1
        children:
          - id: gg-2-box
            status: INTERNAL
            title: "Another item"
            description: ["stretched taller than its content"]

  # ── ROW 6 · a SIX-COLUMN BAND — the collapse cascade generalises to ANY N ──
  # A columns:6 leaf grid proves the …→2→1 cascade is no longer enumerated per
  # column count (the old sec-c3/c4/c5 rules left a 6+-column grid uncollapsed
  # between ~640 and 1000px, where it could overflow — invariant O). Here it is
  # 6 cells wide above 1000px, folds to the 2-col "two-table" step at medium, and
  # to 1 column at the narrow endpoint — all asserted green by F and O.
  - id: section-h
    title: "Section H"
    subtitle: "a six-column band — the collapse cascade now generalises to any N (6 → 2 → 1)"
    variant: normal
    order: 8
    span: 2
    columns: 6
    children:
      - id: h-1
        status: STEP
        title: "One"
        description: ["cell 1 of 6"]
      - id: h-2
        status: STEP
        title: "Two"
        description: ["cell 2 of 6"]
      - id: h-3
        status: STEP
        title: "Three"
        description: ["cell 3 of 6"]
      - id: h-4
        status: STEP
        title: "Four"
        description: ["cell 4 of 6"]
      - id: h-5
        status: STEP
        title: "Five"
        description: ["cell 5 of 6"]
      - id: h-6
        status: STEP
        title: "Six"
        description: ["cell 6 of 6"]

  # ── ROW 7 · a MIXED COMPOUND band — span-weighted sections + a lone box ──
  # A compound grid (its children include sections) whose section widths FOLLOW
  # CONTENT WEIGHT: "Heavy" carries span:2 so it grows twice as wide as the span:1
  # "Light", instead of the two splitting the row 50/50 (the branchkinect GCP-vs-
  # Cloud SQL residual). The lone "Card" box is a LEAF sibling of the sections: it
  # sizes to CONTENT (a fixed-height card), never ballooning to an equal flex
  # slice. Both behaviours are hard-guarded by invariant G.
  - id: section-i
    title: "Section I"
    subtitle: "a mixed compound — Heavy (span:2) is wider than Light (span:1); the lone Card box stays card-sized"
    variant: normal
    order: 9
    span: 2
    columns: 4
    children:
      - id: heavy
        title: "Heavy"
        subtitle: "span:2 — grows twice as wide"
        variant: normal
        order: 1
        span: 2
        columns: 2
        children:
          - id: heavy-1
            status: NEW
            title: "Alpha"
            description: ["content-heavy section"]
          - id: heavy-2
            status: NEW
            title: "Beta"
            description: ["four boxes in two columns"]
          - id: heavy-3
            status: NEW
            title: "Gamma"
            description: ["so it earns the width"]
          - id: heavy-4
            status: NEW
            title: "Delta"
            description: ["span:2 → flex-grow 2"]
      - id: card
        type: box
        order: 2
        status: NOTE
        title: "Card"
        description: ["a lone box beside sections", "sizes to content, never balloons"]
        detail: "This box is a LEAF sibling of the two sections in a compound grid. Because ANY section child makes the grid compound, a naive rule would give this box an equal flex slice and balloon it. Instead it sizes to its content and keeps the uniform cell height — invariant G fails if it ever grows."
      - id: light
        title: "Light"
        subtitle: "span:1 — grows half as wide"
        variant: normal
        order: 3
        span: 1
        columns: 1
        children:
          - id: light-1
            status: UNCHANGED
            title: "Solo"
            description: ["a lighter section"]
